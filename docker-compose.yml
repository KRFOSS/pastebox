services:
  pastebox:
    # 소스 코드에서 직접 빌드하려면 아래 build 주석을 해제하세요.
    # build: .
    image: ghcr.io/krfoss/pastebox:latest
    container_name: pastebox
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATA_DIR: "/paste-data"
      LISTEN_ADDR: ":8080"
      TZ: "Asia/Seoul"
    volumes:
      - ./data:/paste-data
      - ./config.conf:/app/config.conf
