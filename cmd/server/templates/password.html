<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 필요 - Pastebox</title>
    <style>
        :root {
            --focus-ring: #06b6d4;
        }

        html {
            box-sizing: border-box;
        }

        *, *::before, *::after {
            box-sizing: inherit;
        }

        html, body {
            width: 100%;
            overflow-x: hidden;
        }

        * {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji", sans-serif;
        }

        body {
            background: #1a1a1a;
            color: #e5e5e5;
            margin: 0;
            padding: 0;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        :focus-visible {
            outline: 3px solid var(--focus-ring);
            outline-offset: 2px;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            box-shadow: none !important;
            border: none !important;
            padding-bottom: 40px !important;
            z-index: 1000;
            background: linear-gradient( to bottom, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.65) 20%, rgba(0, 0, 0, 0.50) 40%, rgba(0, 0, 0, 0.35) 60%, rgba(0, 0, 0, 0.20) 75%, rgba(0, 0, 0, 0.10) 85%, rgba(0, 0, 0, 0.04) 93%, rgba(0, 0, 0, 0) 100% ) !important;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), background 0.4s ease;
            padding: 23px !important;
            transform: translateY(0);
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: nowrap;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            font-size: 24px;
            font-weight: 700;
        }

        .navbar-brand img {
            height: 40px;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 140px 20px 80px;
            box-sizing: border-box;
        }

        .content-wrapper {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .info-section {
            background-color: #242424;
            border-radius: 10px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-top: 0;
            margin-bottom: 8px;
        }

        .description {
            font-size: 15px;
            line-height: 1.5;
            color: #a0a0a0;
            margin-bottom: 24px;
        }

        .error-message {
            color: #ef4444;
            font-size: 15px;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: rgba(235, 235, 245, 0.6);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            background-color: #1a1a1a;
            border: 1px solid rgba(84, 84, 88, 0.4);
            border-radius: 10px;
            padding: 12px 16px;
            color: #ffffff;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: #ffffff;
        }

        .button {
            width: 100%;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 10px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .button:hover {
            background-color: rgba(255, 255, 255, 0.85);
        }

        .button:active {
            transform: scale(0.98);
        }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #ccc;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img data-cfasync="false" loading="eager" decoding="async" src="https://cdn.krfoss.org/web/ROKFOSS.png" alt="ROKFOSS">
            </a>
        </div>
    </nav>

    <main class="main-container">
        <div class="content-wrapper">
            <div class="info-section">
                <h1>비밀번호 필요</h1>
                
                {{ if .Error }}
                <p class="error-message">{{ .Error }}</p>
                {{ else }}
                <p class="description">비밀번호로 보호된 데이터입니다. 열람하려면 비밀번호를 입력하세요.</p>
                {{ end }}

                <form method="post" action="{{ .Action }}">
                    <div class="form-group">
                        <label for="password">비밀번호</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required autofocus>
                    </div>
                    <button type="submit" class="button">데이터 보기</button>
                </form>

                <a href="/" class="back-link">메인으로 돌아가기</a>
            </div>
        </div>
    </main>
</body>
</html>
